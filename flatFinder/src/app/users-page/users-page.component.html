<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Users Page</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <div *ngIf="loading">Loading...</div>

<div *ngIf="!loading && !isAdmin">
  <h2>Access Denied</h2>
</div>

<table *ngIf="!loading && isAdmin" border="1">

  <thead>
    <tr>
      <th>First Name</th>
      <th>Last Name</th>
      <th>Email</th>
      <th>Birth Date</th>
      <th>Admin</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let user of users">
      <td>{{ user.firstName }}</td>
      <td>{{ user.lastName }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.birthDate }}</td>
      <td>{{ user.admin ? 'Yes' : 'No' }}</td>
    </tr>
  </tbody>

</table>
</body>
</html>
