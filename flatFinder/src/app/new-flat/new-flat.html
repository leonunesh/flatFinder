<div class="new-flat-container">
  <h1>Add New Flat</h1>

  <div class="navigation">
    <a routerLink="/home">Home</a> |
    <a routerLink="/my-flats">My Flats</a> |
    <a routerLink="/favorites">Favorites</a> |
    <a routerLink="/messages">Messages</a> |
    <a routerLink="/profile">Profile</a> |
    <a routerLink="/users">Users</a>
    <button class="logout-button" (click)="logout()">Logout</button>
  </div>

  <form [formGroup]="flatForm" (ngSubmit)="submitForm()">
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" formControlName="name" id="name">
    </div>
    <div class="form-group">
      <label for="address">Address:</label>
      <input type="text" formControlName="address" id="address">
    </div>

    <div class="form-group">
      <label for="city">City:</label>
      <input type="text" formControlName="city" id="city">
    </div>

    <div class="form-group">
      <label for="rent">Rent ($):</label>
      <input type="number" formControlName="rent" id="rent">
    </div>

    <div class="form-group">
      <label for="area-size">Area (m²):</label>
      <input type="number" formControlName="areaSize" id="area-size">
    </div>

    <div class="form-group">
      <label for="hasAC">Air Conditioning:</label>
      <input type="checkbox" formControlName="hasAC" id="hasAC">
    </div>

    <div class="form-group">
      <label for="yearBuilt">Year Built:</label>
      <input type="number" formControlName="yearBuilt" id="yearBuilt">
    </div>

    <div class="form-group">
      <label for="dateAvailable">Available Date:</label>
      <input type="date" formControlName="dateAvailable" id="dateAvailable">
    </div>

    <button type="submit" [disabled]="!flatForm.valid || loading">
      {{ loading ? 'Adding...' : 'Add Flat' }}
    </button>
  </form>
</div>
