<div class="login-container">
  <h1>Login</h1>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <label>
      Email
      <input type="email" formControlName="email" placeholder="Digite seu email">
    </label>
    <div class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
      Email válido é obrigatório
    </div>

    <label>
      Senha
      <input type="password" formControlName="password" placeholder="Digite sua senha">
    </label>
    <div class="field-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
      Senha é obrigatória
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>

    <div class="links">
      <p>Não tem conta? <a routerLink="/register">Cadastre-se aqui</a></p>
    </div>
  </form>
</div>
