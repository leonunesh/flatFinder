<div class="flat-details-dialog">
  <h2 mat-dialog-title>Editar Imóvel</h2>
  <mat-dialog-content>
    <form [formGroup]="form" class="edit-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="name" required>
        <mat-error *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
          Nome é obrigatório
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Endereço</mat-label>
        <input matInput formControlName="address" required>
        <mat-error *ngIf="form.get('address')?.invalid && form.get('address')?.touched">
          Endereço é obrigatório
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Cidade</mat-label>
        <input matInput formControlName="city" required>
        <mat-error *ngIf="form.get('city')?.invalid && form.get('city')?.touched">
          Cidade é obrigatória
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Aluguel (R$)</mat-label>
        <input matInput type="number" formControlName="rent" required>
        <mat-error *ngIf="form.get('rent')?.invalid && form.get('rent')?.touched">
          Valor deve ser maior que 0
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Área (m²)</mat-label>
        <input matInput type="number" formControlName="areaSize" required>
        <mat-error *ngIf="form.get('areaSize')?.invalid && form.get('areaSize')?.touched">
          Área deve ser maior que 0
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Ano de Construção</mat-label>
        <input matInput type="number" formControlName="yearBuilt">
        <mat-error *ngIf="form.get('yearBuilt')?.invalid && form.get('yearBuilt')?.touched">
          Ano inválido
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Data Disponível</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="dateAvailable" required>
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
        <mat-error *ngIf="form.get('dateAvailable')?.invalid && form.get('dateAvailable')?.touched">
          Data é obrigatória
        </mat-error>
      </mat-form-field>

      <mat-checkbox formControlName="hasAC" class="checkbox-field">
        Possui Ar Condicionado
      </mat-checkbox>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancelar</button>
    <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">
      Salvar
    </button>
  </mat-dialog-actions>
</div>
