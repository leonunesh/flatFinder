<!DOCTYPE html>
<html>

<body>
<h2>My flat's details</h2>

<div class="flat-details" *ngIf="flat && !editMode">
  <p><strong>Name:</strong> {{ flat?.name }}</p>
  <p><strong>Address:</strong> {{ flat?.address }}</p>
  <p><strong>City:</strong> {{ flat?.city }}</p>
  <p><strong>Rent:</strong> {{ flat?.rent | currency }}</p>
  <p><strong>Area Size:</strong> {{ flat?.areaSize }} sqm</p>
  <p><strong>Has AC:</strong> {{ flat?.hasAC ? 'Yes' : 'No' }}</p>
  <p><strong>Year Built:</strong> {{ flat?.yearBuilt }}</p>
  <p><strong>Date Available:</strong> {{ flat?.dateAvailable | date }}</p>

  <!-- Botão Editar visível apenas para o proprietário -->
  <button *ngIf="isOwner" (click)="startEdit()">Editar</button>
</div>

<!-- Formulário de edição -->
<div class="flat-edit" *ngIf="flat && editMode">
  <form [formGroup]="form" (ngSubmit)="save()">
    <label>
      Name
      <input formControlName="name" />
    </label>

    <label>
      Address
      <input formControlName="address" />
    </label>

    <label>
      City
      <input formControlName="city" />
    </label>

    <label>
      Rent
      <input type="number" formControlName="rent" />
    </label>

    <label>
      Area Size (sqm)
      <input type="number" formControlName="areaSize" />
    </label>

    <label>
      Has AC
      <input type="checkbox" formControlName="hasAC" />
    </label>

    <label>
      Year Built
      <input type="number" formControlName="yearBuilt" />
    </label>

    <label>
      Date Available
      <input type="date" formControlName="dateAvailable" />
    </label>

    <div class="actions">
      <button type="submit">Salvar</button>
      <button type="button" (click)="cancelEdit()">Cancelar</button>
    </div>
  </form>
</div>
</body>
</html
