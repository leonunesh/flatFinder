<div class="new-flat-container">
  <h1>Adicionar Novo Imóvel</h1>
  <form [formGroup]="flatForm" (ngSubmit)="submitForm()">
    <div class="form-group">
      <label for="name">Nome:</label>
      <input type="text" formControlName="name" id="name">
    </div>
    <div class="form-group">
      <label for="address">Endereço:</label>
      <input type="text" formControlName="address" id="address">
    </div>

    <div class="form-group">
      <label for="city">Cidade:</label>
      <input type="text" formControlName="city" id="city">
    </div>

    <div class="form-group">
      <label for="rent">Aluguel (R$):</label>
      <input type="number" formControlName="rent" id="rent">
    </div>

    <div class="form-group">
      <label for="area-size">Área (m²):</label>
      <input type="number" formControlName="areaSize" id="area-size">
    </div>

    <div class="form-group">
      <label for="hasAC">Ar Condicionado:</label>
      <input type="checkbox" formControlName="hasAC" id="hasAC">
    </div>

    <div class="form-group">
      <label for="yearBuilt">Ano de Construção:</label>
      <input type="number" formControlName="yearBuilt" id="yearBuilt">
    </div>

    <div class="form-group">
      <label for="dateAvailable">Data Disponível:</label>
      <input type="date" formControlName="dateAvailable" id="dateAvailable">
    </div>

    <button type="submit" [disabled]="!flatForm.valid || loading">
      {{ loading ? 'Adicionando...' : 'Adicionar Imóvel' }}
    </button>
  </form>
</div>
