<div class="register-container">
  <h1>Cadastro</h1>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <label>
      Nome
      <input type="text" formControlName="firstName" placeholder="Digite seu nome">
    </label>
    <div class="field-error" *ngIf="registerForm.get('firstName')?.touched && registerForm.get('firstName')?.invalid">
      Nome é obrigatório
    </div>

    <label>
      Sobrenome
      <input type="text" formControlName="lastName" placeholder="Digite seu sobrenome">
    </label>
    <div class="field-error" *ngIf="registerForm.get('lastName')?.touched && registerForm.get('lastName')?.invalid">
      Sobrenome é obrigatório
    </div>

    <label>
      Email
      <input type="email" formControlName="email" placeholder="Digite seu email">
    </label>
    <div class="field-error" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
      Email válido é obrigatório
    </div>

    <label>
      Senha
      <input type="password" formControlName="password" placeholder="Digite sua senha">
    </label>
    <div class="field-error" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
      Senha deve ter pelo menos 6 caracteres
    </div>

    <label>
      Data de Nascimento
      <input type="date" formControlName="birthDate">
    </label>
    <div class="field-error" *ngIf="registerForm.get('birthDate')?.touched && registerForm.get('birthDate')?.invalid">
      Data de nascimento é obrigatória
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button type="submit" [disabled]="loading || registerForm.invalid">
      {{ loading ? 'Cadastrando...' : 'Cadastrar' }}
    </button>

    <div class="links">
      <p>Já tem conta? <a routerLink="/login">Faça login aqui</a></p>
    </div>
  </form>
</div>
