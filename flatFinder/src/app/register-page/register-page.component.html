<div class="register-container">
  <h1>Register</h1>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <label>
      First Name
      <input type="text" formControlName="firstName" placeholder="Enter your first name">
    </label>
    <div class="field-error" *ngIf="registerForm.get('firstName')?.touched && registerForm.get('firstName')?.invalid">
      First name is required
    </div>

    <label>
      Last Name
      <input type="text" formControlName="lastName" placeholder="Enter your last name">
    </label>
    <div class="field-error" *ngIf="registerForm.get('lastName')?.touched && registerForm.get('lastName')?.invalid">
      Last name is required
    </div>

    <label>
      Email
      <input type="email" formControlName="email" placeholder="Enter your email">
    </label>
    <div class="field-error" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
      Valid email is required
    </div>

    <label>
      Password
      <input type="password" formControlName="password" placeholder="Enter your password">
    </label>
    <div class="field-error" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
      Password must have at least 6 characters
    </div>

    <label>
      Birth Date
      <input type="date" formControlName="birthDate">
    </label>
    <div class="field-error" *ngIf="registerForm.get('birthDate')?.touched && registerForm.get('birthDate')?.invalid">
      Birth date is required
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button type="submit" [disabled]="loading || registerForm.invalid">
      {{ loading ? 'Registering...' : 'Register' }}
    </button>

    <div class="links">
      <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </div>
  </form>
</div>
